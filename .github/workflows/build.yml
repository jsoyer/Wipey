name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── WipeyCore unit tests (Swift Package — no xcodeproj needed) ─────────────
  test-core:
    name: WipeyCore Tests
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Run WipeyCore tests
        working-directory: WipeyCore
        run: swift test

  # ── macOS app build (requires XcodeGen to produce the xcodeproj) ──────────
  build-macos:
    name: Build macOS app
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project Wipey.xcodeproj \
            -scheme Wipey \
            -configuration Debug \
            -destination "platform=macOS" \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
